name: Recurring Audit Reminder

# Backup notification mechanism for recurring audits in the AI Sector
# Research OS. Pairs with the date-aware SessionStart hook
# (~/.claude/session-start-hook.py / research/meta/hooks/) — the hook
# surfaces overdue items at session start, but only fires when a session
# starts. This workflow runs on schedule regardless of user presence and
# creates/updates GitHub issues for items that are DUE/OVERDUE.
#
# Truly autonomous completion (the audit work itself running on schedule)
# requires Claude Code Triggers — see research/meta/recurring-audit-log.md
# for setup. This workflow is the notification fallback for when Triggers
# aren't configured or fail.

on:
  schedule:
    # Every Monday at 9am UTC. Weekly catches OVERDUE + DUE_SOON in time.
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual run for testing

permissions:
  contents: read
  issues: write

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect DUE/OVERDUE recurring items
        id: detect
        run: |
          python .github/scripts/check-recurring-todos.py > /tmp/items.jsonl
          echo "Items detected:"
          cat /tmp/items.jsonl
          if [ -s /tmp/items.jsonl ]; then
            echo "has_items=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_items=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload items list
        if: steps.detect.outputs.has_items == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: detected-items
          path: /tmp/items.jsonl
          retention-days: 7

      - name: Create or update GitHub issues
        if: steps.detect.outputs.has_items == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lines = fs.readFileSync('/tmp/items.jsonl', 'utf-8').trim().split('\n');

            const STATUS_META = {
              OVERDUE:   { emoji: '🚨', phrase: (d) => `OVERDUE by ${Math.abs(d)} day(s)` },
              DUE_TODAY: { emoji: '⏰', phrase: ()  => 'DUE TODAY' },
              DUE_SOON:  { emoji: '📅', phrase: (d) => `DUE SOON (in ${d} day(s))` },
            };

            for (const line of lines) {
              if (!line.trim()) continue;
              const item = JSON.parse(line);
              const meta = STATUS_META[item.status] || { emoji: '📋', phrase: () => item.status };
              const urgency = meta.phrase(item.days);
              const titlePrefix = `[Recurring Audit] ${item.title}`;
              const newTitle = `${meta.emoji} ${titlePrefix} — ${urgency}`;

              // Search for an existing open issue with this audit's title prefix
              const { data: issues } = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${titlePrefix}"`,
              });

              const body = [
                `**Status:** ${meta.emoji} ${urgency}`,
                `**Due date:** ${item.date}`,
                `**Priority:** ${item.priority}`,
                ``,
                `This is an automated reminder from \`.github/workflows/recurring-audit-reminder.yml\`.`,
                ``,
                `The date-aware SessionStart hook (\`research/meta/hooks/session-start-hook.py\`) will also surface this item at the top of the next session briefing.`,
                ``,
                `**To resolve:**`,
                `1. Start a Claude Code session in this repo`,
                `2. The SessionStart hook will surface this item prominently`,
                `3. Complete the audit per its scope in \`research/meta/todo.md\``,
                `4. Log the completion in \`research/meta/recurring-audit-log.md\``,
                `5. Close this issue`,
                ``,
                `**For truly autonomous handling:** configure a Claude Code Trigger to start a session on schedule. See \`research/meta/recurring-audit-log.md\` for setup instructions.`,
                ``,
                `---`,
                `*Auto-generated by recurring-audit-reminder workflow. Will re-comment with updated urgency on next run if still unresolved.*`,
              ].join('\n');

              if (issues.total_count > 0) {
                const existing = issues.items[0];
                console.log(`Issue #${existing.number} already exists for '${item.title}' — adding update comment`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `**Status update (${new Date().toISOString().slice(0,10)}):** ${meta.emoji} ${urgency}. Still open.`,
                });
              } else {
                console.log(`Creating new issue for '${item.title}'`);
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: newTitle,
                  body: body,
                  labels: ['recurring-audit'],
                });
              }
            }

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.detect.outputs.has_items }}" = "true" ]; then
            echo "Detected items requiring attention — issues created/updated"
          else
            echo "No recurring items currently DUE/OVERDUE/DUE_SOON"
          fi
